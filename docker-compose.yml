version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    command: uvicorn backend:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  frontend:
    build: .
    ports:
      - "8501:8501"
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped
